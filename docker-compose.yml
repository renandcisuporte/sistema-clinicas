services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    networks:
      - traefik-network
    ports:
      - 3004:3004

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=db # Use o nome do serviço em vez de host.docker.internal
      - PMA_USER=root
      - PMA_PASSWORD=root
      - PMA_PORT=3306
      - TZ=America/Sao_Paulo
    depends_on:
      - db
    networks:
      - traefik-network
    ports:
      - 8004:80

  db:
    image: mysql:5.7
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - 3306:3306
    volumes:
      - ./.db/:/var/lib/mysql
    networks:
      - traefik-network
    environment:
      TZ: America/Sao_Paulo
      MYSQL_DATABASE: clinics_db
      MYSQL_ROOT_PASSWORD: root

  mailhog:
    image: mailhog/mailhog
    networks:
      - traefik-network
    ports:
      - 8005:8025
      - 1025:1025

networks:
  traefik-network:
    driver: bridge
